<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק מדע</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔬%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: system-ui, "Segoe UI", Arial, sans-serif;
    background: #edf7f6;
    color: #15313a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px;
    direction: rtl;
  }
  header, #progress, #card, #summary, #start-screen, #user-screen {
    width: 100%;
    max-width: 760px;
  }
  header {
    display: none;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(1.45rem, 3vw, 2.1rem);
    color: #12505a;
    line-height: 1.1;
  }
  #player-line {
    margin-top: 4px;
    color: #4d6870;
    font-size: 0.95rem;
  }
  .header-main {
    min-width: 0;
  }
  .header-actions {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-top: 7px;
  }
  #score-box {
    background: #12505a;
    color: #fff;
    border-radius: 24px;
    padding: 10px 20px;
    min-width: 112px;
    text-align: center;
    font-weight: 800;
    box-shadow: 0 10px 24px rgba(18, 80, 90, 0.18);
  }
  #start-screen, #user-screen {
    margin-top: 64px;
    background: #fff;
    border: 1px solid #cfe5e1;
    border-radius: 18px;
    padding: 30px 24px;
    box-shadow: 0 16px 40px rgba(21, 49, 58, 0.11);
    text-align: center;
  }
  #user-screen { display: none; }
  #start-screen h1, #user-screen h1 { margin-bottom: 16px; }
  #user-list {
    display: grid;
    gap: 9px;
    margin-bottom: 14px;
  }
  .user-row {
    display: flex;
    align-items: stretch;
    gap: 8px;
  }
  .user-btn {
    flex: 1;
    min-height: 56px;
    border: 2px solid #cfe5e1;
    border-radius: 12px;
    background: #fbfdfc;
    color: #15313a;
    padding: 10px 12px;
    text-align: right;
    font-weight: 900;
  }
  .user-btn span {
    display: block;
    margin-top: 3px;
    color: #6b8288;
    font-size: 0.8rem;
    font-weight: 700;
  }
  .icon-btn {
    min-width: 48px;
    border: 2px solid #cfe5e1;
    border-radius: 12px;
    background: #e9f6f5;
    color: #12505a;
    font-weight: 900;
  }
  #name-input {
    width: 100%;
    max-width: 360px;
    padding: 13px 16px;
    border: 2px solid #cfe5e1;
    border-radius: 12px;
    font: inherit;
    text-align: right;
    margin-bottom: 12px;
  }
  .setup-group {
    margin: 14px auto 0;
    max-width: 520px;
    text-align: right;
  }
  .setup-label {
    display: block;
    margin-bottom: 8px;
    color: #4d6870;
    font-weight: 800;
  }
  .option-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .setup-option {
    min-height: 54px;
    border: 2px solid #cfe5e1;
    border-radius: 12px;
    background: #fbfdfc;
    color: #15313a;
    font-weight: 900;
    line-height: 1.15;
    padding: 8px 10px;
  }
  .setup-option span {
    display: block;
    margin-top: 3px;
    color: #6b8288;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .setup-option.selected {
    border-color: #12505a;
    background: #e9f6f5;
    color: #12505a;
  }
  #start-btn { margin-top: 18px; }
  button {
    font: inherit;
    cursor: pointer;
  }
  .primary {
    border: 0;
    border-radius: 12px;
    background: #12505a;
    color: #fff;
    padding: 12px 24px;
    font-weight: 800;
  }
  .secondary {
    border: 1px solid #aacdc8;
    border-radius: 999px;
    background: #fff;
    color: #12505a;
    padding: 7px 12px;
    font-weight: 700;
  }
  #progress {
    display: none;
    color: #4d6870;
    margin-bottom: 10px;
  }
  #card {
    display: none;
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 18px 44px rgba(21, 49, 58, 0.13);
  }
  #visual {
    min-height: 220px;
    background:
      radial-gradient(circle at 18% 22%, #f7d56f 0 52px, transparent 54px),
      linear-gradient(135deg, #d9f2f0 0%, #f8fbef 55%, #ffe8c9 100%);
    display: grid;
    place-items: center;
    border-bottom: 1px solid #d8e9e6;
  }
  #icon {
    width: min(40vw, 190px);
    aspect-ratio: 1;
    border-radius: 50%;
    background: rgba(255,255,255,0.72);
    border: 6px solid rgba(18,80,90,0.12);
    display: grid;
    place-items: center;
    font-size: clamp(4.5rem, 16vw, 8.5rem);
    box-shadow: 0 18px 34px rgba(21, 49, 58, 0.13);
  }
  #question-row {
    padding: 18px 24px 8px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  #question {
    font-size: clamp(1.15rem, 2.7vw, 1.45rem);
    font-weight: 900;
    line-height: 1.35;
    color: #12505a;
  }
  #topic {
    flex-shrink: 0;
    background: #e7f4ed;
    color: #236245;
    border-radius: 999px;
    padding: 5px 12px;
    font-weight: 800;
    font-size: 0.9rem;
  }
  #choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px 24px 22px;
  }
  .choice {
    min-height: 76px;
    border: 2px solid #d5dfdd;
    background: #fbfdfc;
    border-radius: 12px;
    color: #15313a;
    padding: 12px;
    font-size: 1.08rem;
    font-weight: 800;
    line-height: 1.25;
  }
  .choice:hover:not(:disabled) {
    border-color: #12505a;
    background: #e9f6f5;
  }
  .choice.correct { background: #d9f0df; border-color: #238247; }
  .choice.wrong { background: #ffe0dd; border-color: #c43c32; }
  .choice.reveal { background: #d9f0df; border-color: #238247; }
  .choice.hidden-after-answer { display: none; }
  #info-box {
    display: none;
    margin: 0 24px 16px;
    padding: 13px 15px;
    border-radius: 12px;
    border-right: 5px solid #12505a;
    background: #f1f9f8;
    line-height: 1.55;
    color: #24444c;
  }
  #next-btn {
    display: none;
    width: calc(100% - 48px);
    margin: 0 24px 22px;
  }
  #summary {
    display: none;
    background: #fff;
    border-radius: 18px;
    padding: 30px 24px;
    text-align: center;
    box-shadow: 0 16px 40px rgba(21, 49, 58, 0.11);
  }
  #summary h2 { color: #12505a; margin-bottom: 8px; font-size: 1.8rem; }
  #final-score { font-size: 2.8rem; font-weight: 900; color: #236245; margin: 10px 0; }
  #summary-text { color: #4d6870; margin-bottom: 18px; }
  #levels {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0 22px;
    text-align: right;
  }
  #levels th, #levels td { padding: 8px 10px; border-bottom: 1px solid #e6efed; }
  #levels th { color: #12505a; background: #edf7f6; }
  #report-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(21,49,58,0.48);
    align-items: flex-start;
    justify-content: center;
    padding: 22px 14px;
    overflow-y: auto;
  }
  #report-overlay.open { display: flex; }
  #report-box {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 18px;
    padding: 22px 20px;
    box-shadow: 0 20px 52px rgba(21,49,58,0.24);
  }
  #report-close {
    float: left;
    border: 0;
    background: transparent;
    color: #6b8288;
    font-size: 1.4rem;
    line-height: 1;
  }
  #report-title { color: #12505a; margin-bottom: 4px; }
  #report-meta { color: #6b8288; margin-bottom: 16px; }
  .report-table {
    width: 100%;
    border-collapse: collapse;
    text-align: right;
  }
  .report-table th, .report-table td {
    padding: 8px 7px;
    border-bottom: 1px solid #e6efed;
  }
  .report-table th {
    color: #12505a;
    background: #edf7f6;
  }
  @media (max-width: 640px) {
    body { padding: 12px; }
    header { align-items: flex-start; }
    .header-actions { gap: 5px; }
    .secondary { padding: 7px 9px; font-size: 0.85rem; }
    #score-box { min-width: 86px; padding: 8px 12px; font-size: 0.92rem; }
    #visual { min-height: 180px; }
    #question-row { padding: 14px 16px 4px; flex-direction: column; }
    #choices { grid-template-columns: 1fr; padding: 12px 16px 16px; gap: 9px; }
    .choice { min-height: 62px; font-size: 1rem; }
    #info-box { margin: 0 16px 14px; }
    #next-btn { width: calc(100% - 32px); margin: 0 16px 18px; }
    .option-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="report-overlay">
  <div id="report-box">
    <button id="report-close" aria-label="סגור">✕</button>
    <h2 id="report-title"></h2>
    <div id="report-meta"></div>
    <div id="report-content"></div>
  </div>
</div>

<section id="user-screen">
  <h1>משחק מדע 🔬</h1>
  <div id="user-list"></div>
  <button id="new-user-btn" class="primary">משתמש חדש</button>
</section>

<section id="start-screen">
  <h1>משחק מדע 🔬</h1>
  <input id="name-input" type="text" placeholder="השם שלך" maxlength="30">
  <div class="setup-group">
    <span class="setup-label">רמה</span>
    <div class="option-grid" id="level-options">
      <button type="button" class="setup-option selected" data-level="junior">צעיר<span>בערך גיל 5</span></button>
      <button type="button" class="setup-option" data-level="standard">רגיל<span>בערך גיל 8</span></button>
      <button type="button" class="setup-option" data-level="challenge">אתגר<span>מתקדמים</span></button>
    </div>
  </div>
  <div class="setup-group">
    <span class="setup-label">מספר שאלות</span>
    <div class="option-grid" id="count-options">
      <button type="button" class="setup-option" data-count="6">6<span>קצר</span></button>
      <button type="button" class="setup-option selected" data-count="10">10<span>רגיל</span></button>
      <button type="button" class="setup-option" data-count="15">15<span>ארוך</span></button>
    </div>
  </div>
  <div>
    <button id="start-btn" class="primary">התחל משחק</button>
  </div>
  <div style="margin-top:12px">
    <button id="setup-scores-btn" class="secondary">ניקוד</button>
    <button id="setup-change-user-btn" class="secondary">שנה משתמש</button>
  </div>
</section>

<header id="header">
  <div class="header-main">
    <h1>משחק מדע 🔬</h1>
    <div id="player-line"></div>
    <div class="header-actions">
      <button id="home-btn" class="secondary">בית</button>
      <button id="scores-btn" class="secondary">ניקוד</button>
      <button id="change-user-btn" class="secondary">שנה משתמש</button>
    </div>
  </div>
  <div id="score-box">ניקוד: <span id="score">0</span></div>
</header>

<div id="progress"></div>

<main id="card">
  <div id="visual"><div id="icon"></div></div>
  <div id="question-row">
    <div id="question"></div>
    <div id="topic"></div>
  </div>
  <div id="choices"></div>
  <div id="info-box"></div>
  <button id="next-btn" class="primary">הבא ◀</button>
</main>

<section id="summary">
  <h2>סיום!</h2>
  <div id="final-score"></div>
  <p id="summary-text"></p>
  <table id="levels">
    <tr><th>נושא</th><th>רמה</th><th>נפתרו</th></tr>
  </table>
  <button id="again-btn" class="primary">משחק נוסף</button>
  <button id="summary-home-btn" class="secondary">בית</button>
  <button id="summary-scores-btn" class="secondary">ניקוד</button>
  <button id="change-player-btn" class="secondary">שנה שחקן</button>
</section>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { firebaseConfig } from './firebase-config.js';

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const USERS_COLLECTION = 'scienceUsers';

const STORAGE_KEY = 'science_questions_progress_v2';
const PLAYER_KEY = 'science_questions_player';
const LEVEL_KEY = 'science_questions_level';
const COUNT_KEY = 'science_questions_count';
const LEVEL_NAMES = ['מתחיל', 'חוקר', 'מבין', 'פותר', 'מדען!'];

let pending = [];
let currentQuestion = null;
let answered = 0;
let score = 0;
let streak = 0;
let player = '';
let data = null;
let selectedLevel = 'junior';
let selectedQuestionCount = 10;
let currentProfile = null;

const TRACK = {
  title: 'פיזיקה של דברים יומיומיים',
  families: {
    friction: { name: 'חיכוך', icon: '🛝' },
    circuits: { name: 'חשמל ומעגלים', icon: '🔋' },
    density: { name: 'צפיפות וציפה', icon: '🪨' },
    heat: { name: 'חום ושינויי מצב', icon: '🌡️' },
    light: { name: 'אור וצל', icon: '🔦' },
    experiments: { name: 'ניסוי הוגן', icon: '🧪' }
  }
};

const LEVEL_PROFILES = {
  junior: {
    label: 'צעיר',
    subtitle: 'בערך גיל 5',
    minDifficulty: 1,
    maxDifficulty: 1,
    choiceCount: 2,
    levelStepStreak: 4,
    families: ['friction', 'density', 'heat', 'light']
  },
  standard: {
    label: 'רגיל',
    subtitle: 'בערך גיל 8',
    minDifficulty: 1,
    maxDifficulty: 4,
    choiceCount: 4,
    levelStepStreak: 3,
    families: ['friction', 'circuits', 'density', 'heat', 'light', 'experiments']
  },
  challenge: {
    label: 'אתגר',
    subtitle: 'מתקדמים',
    minDifficulty: 2,
    maxDifficulty: 5,
    choiceCount: 4,
    levelStepStreak: 2,
    families: ['friction', 'circuits', 'density', 'heat', 'light', 'experiments']
  }
};

const SURFACES = [
  { name: 'קרח', friction: 'נמוך' },
  { name: 'רצפה רטובה', friction: 'נמוך' },
  { name: 'שטיח מחוספס', friction: 'גבוה' },
  { name: 'נייר זכוכית', friction: 'גבוה' },
  { name: 'שיש חלק', friction: 'נמוך' },
  { name: 'מדרכה יבשה', friction: 'גבוה' }
];
const MATERIALS = [
  { name: 'עץ', floats: true, density: 'פחות צפוף מהמים' },
  { name: 'פקק שעם', floats: true, density: 'פחות צפוף מהמים' },
  { name: 'אבן', floats: false, density: 'צפופה יותר מהמים' },
  { name: 'מטבע מתכת', floats: false, density: 'צפוף יותר מהמים' },
  { name: 'קוביית קרח', floats: true, density: 'קצת פחות צפופה ממים נוזליים' },
  { name: 'כדור פלסטיק חלול', floats: true, density: 'בממוצע פחות צפוף מהמים' }
];
const CONDUCTORS = [
  { name: 'כף מתכת', conducts: true },
  { name: 'חוט נחושת', conducts: true },
  { name: 'מסמר ברזל', conducts: true },
  { name: 'מקל עץ יבש', conducts: false },
  { name: 'סרגל פלסטיק', conducts: false },
  { name: 'גומייה', conducts: false }
];
const HEAT_CASES = [
  { item: 'כביסה רטובה', hot: 'יום חם עם רוח', cold: 'יום קר ולח בלי רוח' },
  { item: 'שלולית קטנה', hot: 'שמש חזקה ורוח קלה', cold: 'צל, קור ואוויר לח' },
  { item: 'מגבת רטובה', hot: 'חדר חם ומאוורר', cold: 'חדר קר וסגור' }
];
const LIGHT_OBJECTS = ['יד', 'ספר', 'בקבוק אטום', 'כדור'];
const EXPERIMENTS = [
  { test: 'איזה משטח גורם למכונית צעצוע לעצור מהר יותר', change: 'סוג המשטח', keep: 'אותה מכונית ואותה דחיפה' },
  { test: 'האם מים חמים ממיסים סוכר מהר יותר', change: 'טמפרטורת המים', keep: 'אותה כמות מים ואותה כמות סוכר' },
  { test: 'האם אורך החוט משנה את גובה הצליל', change: 'אורך החוט', keep: 'אותו חומר ואותה מתיחה בערך' },
  { test: 'האם גודל הצל משתנה כשמקרבים חפץ לפנס', change: 'מרחק החפץ מהפנס', keep: 'אותו חפץ ואותו פנס' }
];

function shuffle(items) {
  const arr = [...items];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pick(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function loadAllProgress() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function saveAllProgress(all) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

function normalizeUserData(userData = {}) {
  if (!userData.sessionCount) userData.sessionCount = 0;
  if (!userData.solved) userData.solved = {};
  if (!userData.families) userData.families = {};
  if (!userData.history) userData.history = [];
  return userData;
}

async function loadPlayerData(name) {
  const all = loadAllProgress();
  let userData = normalizeUserData(all[name] || {});
  try {
    const snap = await getDoc(doc(db, USERS_COLLECTION, name));
    if (snap.exists()) userData = normalizeUserData(snap.data());
  } catch (err) {
    console.warn('Using local progress because Firestore could not be read.', err);
  }
  all[name] = userData;
  saveAllProgress(all);
  return userData;
}

async function savePlayerData() {
  const all = loadAllProgress();
  all[player] = data;
  saveAllProgress(all);
  try {
    await setDoc(doc(db, USERS_COLLECTION, player), data);
  } catch (err) {
    console.warn('Progress saved locally but not to Firestore.', err);
  }
}

function userStats(userData) {
  const sessions = userData.sessionCount || 0;
  const solved = Object.keys(userData.solved || {}).length;
  const correct = Object.values(userData.families || {}).reduce((sum, state) => sum + (state.correct || 0), 0);
  const total = Object.values(userData.families || {}).reduce((sum, state) => sum + (state.total || 0), 0);
  return { sessions, solved, correct, total };
}

async function loadAllRemoteUsers() {
  const all = loadAllProgress();
  try {
    const snap = await getDocs(collection(db, USERS_COLLECTION));
    snap.forEach(userDoc => {
      all[userDoc.id] = normalizeUserData(userDoc.data());
    });
    saveAllProgress(all);
  } catch (err) {
    console.warn('Using local users because Firestore user list could not be read.', err);
  }
  return all;
}

async function renderUserList() {
  const all = await loadAllRemoteUsers();
  const list = document.getElementById('user-list');
  list.innerHTML = '';
  const names = Object.keys(all).sort((a, b) => a.localeCompare(b));
  if (!names.length) {
    list.innerHTML = '<div style="color:#6b8288;padding:8px 0">עדיין אין משתמשים</div>';
  }
  names.forEach(name => {
    const stats = userStats(all[name]);
    const row = document.createElement('div');
    row.className = 'user-row';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'user-btn';
    btn.innerHTML = `${name}<span>${stats.sessions} משחקים · ${stats.solved} שאלות נפתרו · ${stats.correct}/${stats.total}</span>`;
    btn.addEventListener('click', () => chooseUser(name));

    const reportBtn = document.createElement('button');
    reportBtn.type = 'button';
    reportBtn.className = 'icon-btn';
    reportBtn.title = 'ניקוד';
    reportBtn.textContent = '📊';
    reportBtn.addEventListener('click', () => showReport(name, all[name]).catch(console.error));

    row.appendChild(btn);
    row.appendChild(reportBtn);
    list.appendChild(row);
  });
}

function chooseUser(name) {
  player = name;
  localStorage.setItem(PLAYER_KEY, player);
  document.getElementById('name-input').value = player;
  setScreen('start');
}

async function showUsers() {
  await renderUserList();
  setScreen('users');
}

function familyState(family) {
  if (!data.families[family]) {
    data.families[family] = { level: 1, correct: 0, total: 0, misses: 0 };
  }
  return data.families[family];
}

function makeChoices(correct, distractors) {
  const count = currentProfile ? currentProfile.choiceCount : 4;
  return shuffle([correct, ...distractors.filter(d => d !== correct).slice(0, count - 1)]);
}

function question(id, family, difficulty, prompt, correct, answers, info) {
  const meta = TRACK.families[family];
  return { id, family, difficulty, icon: meta.icon, topic: meta.name, question: prompt, correct, answers, info };
}

function generateFriction(difficulty) {
  const a = pick(SURFACES);
  const b = pick(SURFACES.filter(s => s.friction !== a.friction));
  const low = a.friction === 'נמוך' ? a : b;
  const high = a.friction === 'גבוה' ? a : b;
  if (currentProfile && currentProfile.choiceCount === 2) {
    return question(
      `friction-junior-${low.name}-${high.name}`,
      'friction',
      difficulty,
      `איפה קל יותר להחליק: על ${low.name} או על ${high.name}?`,
      low.name,
      makeChoices(low.name, [high.name, 'שניהם אותו דבר', 'אף אחד מהם']),
      `על ${low.name} יש פחות חיכוך. כשיש פחות חיכוך, דברים מחליקים בקלות רבה יותר.`
    );
  }
  if (difficulty <= 2) {
    return question(
      `friction-low-${low.name}-${high.name}`,
      'friction',
      difficulty,
      'על איזה משטח מכונית צעצוע תחליק רחוק יותר אם נותנים לה אותה דחיפה?',
      low.name,
      makeChoices(low.name, [high.name, 'על שניהם בדיוק אותו דבר', 'אי אפשר לדעת אף פעם']),
      `על ${low.name} יש פחות חיכוך מאשר על ${high.name}. פחות חיכוך מתנגד פחות לתנועה, ולכן המכונית יכולה להמשיך רחוק יותר.`
    );
  }
  return question(
    `friction-stop-${low.name}-${high.name}-${difficulty}`,
    'friction',
    difficulty,
    `שתי מכוניות זהות נוסעות באותה מהירות: אחת על ${low.name} ואחת על ${high.name}. איזו תעצור מהר יותר?`,
    `המכונית על ${high.name}`,
    makeChoices(`המכונית על ${high.name}`, [`המכונית על ${low.name}`, 'שתיהן יעצרו באותו זמן', 'המכונית הקלה יותר תמיד']),
    `חיכוך גבוה יותר מאט תנועה מהר יותר. לכן על ${high.name} המכונית תאבד מהירות מהר יותר מאשר על ${low.name}.`
  );
}

function generateCircuits(difficulty) {
  const material = pick(CONDUCTORS);
  if (difficulty <= 2) {
    const correct = material.conducts ? 'היא תידלק' : 'היא לא תידלק';
    return question(
      `circuits-material-${material.name}`,
      'circuits',
      difficulty,
      `מכניסים ${material.name} לרווח במעגל חשמלי פשוט עם סוללה ונורה. מה יקרה לנורה?`,
      correct,
      makeChoices(correct, ['היא תידלק ואז תקפא', 'הסוללה תהפוך למגנט', 'הנורה תשנה צבע בגלל האוויר']),
      material.conducts
        ? `${material.name} מוליך חשמל, ולכן הוא יכול להשלים את המסלול הסגור של המעגל.`
        : `${material.name} מבודד יחסית, ולכן הזרם לא עובר דרכו בקלות והמעגל נשאר פתוח.`
    );
  }
  const hasBreak = Math.random() < 0.5;
  const correct = hasBreak ? 'אין מסלול סגור לזרם' : 'יש מסלול סגור לזרם';
  return question(
    `circuits-reason-${hasBreak ? 'open' : 'closed'}-${difficulty}`,
    'circuits',
    difficulty,
    hasBreak
      ? 'במעגל עם סוללה ונורה יש חוט אחד מנותק. מה ההסבר הטוב ביותר לכך שהנורה כבויה?'
      : 'במעגל עם סוללה, נורה וחוטים מחוברים היטב הנורה דולקת. מה חייב להיות נכון?',
    correct,
    makeChoices(correct, ['החשמל נגמר כשהוא מגיע לנורה', 'הנורה דולקת רק בגלל חום היד', 'הסוללה עובדת בלי חיבורים']),
    'זרם חשמלי צריך מסלול סגור כדי לזרום. נתק אחד מספיק כדי לעצור את הזרם בכל המעגל.'
  );
}

function generateDensity(difficulty) {
  const material = pick(MATERIALS);
  if (currentProfile && currentProfile.choiceCount === 2) {
    const correct = material.floats ? 'יצוף' : 'ישקע';
    return question(
      `density-junior-${material.name}`,
      'density',
      difficulty,
      `${material.name} במים: מה יקרה?`,
      correct,
      makeChoices(correct, [material.floats ? 'ישקע' : 'יצוף', 'ייעלם', 'יקפוץ']),
      `${material.name} ${material.density}. דברים שפחות צפופים מהמים צפים, ודברים צפופים יותר שוקעים.`
    );
  }
  if (difficulty <= 2) {
    const correct = material.floats ? 'הוא יצוף' : 'הוא ישקע';
    return question(
      `density-float-${material.name}`,
      'density',
      difficulty,
      `מניחים ${material.name} במים. מה סביר שיקרה?`,
      correct,
      makeChoices(correct, ['הוא ייעלם', 'הוא יהפוך לגז מיד', 'הוא תמיד יישאר באמצע']),
      `${material.name} ${material.density}. חפצים שפחות צפופים מהמים צפים, וחפצים צפופים יותר שוקעים.`
    );
  }
  const a = pick(MATERIALS);
  const b = pick(MATERIALS.filter(m => m.floats !== a.floats));
  const floater = a.floats ? a : b;
  const sinker = a.floats ? b : a;
  return question(
    `density-compare-${floater.name}-${sinker.name}-${difficulty}`,
    'density',
    difficulty,
    `למה ${floater.name} יכול לצוף במים אבל ${sinker.name} שוקע, גם אם ${sinker.name} קטן יותר?`,
    'הצפיפות חשובה יותר מהגודל לבדו',
    makeChoices('הצפיפות חשובה יותר מהגודל לבדו', ['כל דבר קטן תמיד שוקע', 'כל דבר גדול תמיד צף', 'מים בוחרים לפי צבע החפץ']),
    `ציפה תלויה בצפיפות הממוצעת של החפץ ביחס למים, לא רק בגודל שלו. ${floater.name} פחות צפוף מהמים, ו-${sinker.name} צפוף יותר.`
  );
}

function generateHeat(difficulty) {
  const item = pick(HEAT_CASES);
  if (currentProfile && currentProfile.choiceCount === 2) {
    return question(
      `heat-junior-${item.item}`,
      'heat',
      difficulty,
      `מתי ${item.item} תתייבש מהר יותר?`,
      item.hot,
      makeChoices(item.hot, [item.cold, 'בתוך שקית סגורה', 'במקרר']),
      'חום ורוח עוזרים למים להתאדות. לכן דברים רטובים מתייבשים מהר יותר כשחם ויש אוויר זז.'
    );
  }
  if (difficulty <= 2) {
    return question(
      `heat-dry-${item.item}`,
      'heat',
      difficulty,
      `מתי ${item.item} תתייבש מהר יותר?`,
      item.hot,
      makeChoices(item.hot, [item.cold, 'כשמכסים אותה בניילון', 'כשאין בכלל אוויר מסביבה']),
      'אידוי מהיר יותר כשחם וכשהאוויר זז. רוח מפנה אדי מים מהמקום ועוזרת לעוד מים להתאדות.'
    );
  }
  const cooling = Math.random() < 0.5;
  const correct = cooling ? 'התעבות: גז הפך לנוזל' : 'התכה: מוצק הפך לנוזל';
  return question(
    `heat-change-${cooling ? 'condense' : 'melt'}-${difficulty}-${Math.floor(Math.random() * 1000)}`,
    'heat',
    difficulty,
    cooling
      ? 'אדי מים נוגעים במכסה קר של סיר והופכים לטיפות. איזה שינוי מצב קרה?'
      : 'קוביית קרח נשארה בשמש והפכה למים. איזה שינוי מצב קרה?',
    correct,
    makeChoices(correct, ['אידוי: נוזל הפך לגז', 'קיפאון: נוזל הפך למוצק', 'מגנטיות: חומר נמשך לברזל']),
    cooling ? 'בהתעבות, אדי מים מתקררים והופכים לטיפות מים נוזליות.' : 'בהתכה, חומר מוצק מקבל חום והופך לנוזל.'
  );
}

function generateLight(difficulty) {
  const object = pick(LIGHT_OBJECTS);
  if (currentProfile && currentProfile.choiceCount === 2) {
    const correct = `לקרב את ה${object} לפנס`;
    return question(
      `light-junior-${object}`,
      'light',
      difficulty,
      `איך עושים צל גדול יותר של ${object}?`,
      correct,
      makeChoices(correct, [`להרחיק את ה${object} מהפנס`, 'לכבות את הפנס', 'לסגור עיניים']),
      'כשהחפץ קרוב לפנס, הוא מסתיר יותר אור ולכן הצל על הקיר גדול יותר.'
    );
  }
  if (difficulty <= 2) {
    const correct = `לקרב את ה${object} לפנס`;
    return question(
      `light-shadow-${object}`,
      'light',
      difficulty,
      `רוצים שצל של ${object} יהיה גדול יותר על הקיר. מה כדאי לעשות?`,
      correct,
      makeChoices(correct, [`להרחיק את ה${object} מהפנס`, 'לכבות את הפנס', 'להשתמש באותו מרחק בדיוק']),
      'כשחפץ קרוב יותר למקור האור, הוא חוסם חלק גדול יותר מקרני האור ולכן הצל שלו גדל.'
    );
  }
  return question(
    `light-refraction-${difficulty}-${Math.floor(Math.random() * 1000)}`,
    'light',
    difficulty,
    'עיפרון בתוך כוס מים נראה כאילו הוא מתכופף במקום שבו הוא נכנס למים. מה ההסבר?',
    'האור משנה כיוון כשהוא עובר בין אוויר למים',
    makeChoices('האור משנה כיוון כשהוא עובר בין אוויר למים', ['המים שוברים את העיפרון באמת', 'העיפרון מושך את האור כמו מגנט', 'העין רואה רק דברים יבשים']),
    'כשאור עובר מחומר אחד לחומר אחר, למשל מאוויר למים, המהירות והכיוון שלו יכולים להשתנות. לכן העיפרון נראה מכופף.'
  );
}

function generateExperiments(difficulty) {
  const exp = pick(EXPERIMENTS);
  if (difficulty <= 2) {
    return question(
      `experiments-change-${exp.change}`,
      'experiments',
      difficulty,
      `בניסוי בודקים ${exp.test}. מה הדבר שכדאי לשנות בכוונה?`,
      exp.change,
      makeChoices(exp.change, [exp.keep, 'כל הדברים בבת אחת', 'את שם הילד שמודד']),
      `בניסוי הוגן משנים בעיקר דבר אחד: ${exp.change}. את שאר הדברים החשובים שומרים דומים כדי לדעת מה השפיע.`
    );
  }
  return question(
    `experiments-keep-${exp.change}-${difficulty}`,
    'experiments',
    difficulty,
    `בניסוי בודקים ${exp.test}. מה חשוב להשאיר אותו דבר כדי שהניסוי יהיה הוגן?`,
    exp.keep,
    makeChoices(exp.keep, [exp.change, 'את התוצאה שרוצים לקבל', 'רק את צבע השולחן']),
    `אם משנים יותר מדי דברים יחד, קשה לדעת מה גרם לתוצאה. לכן שומרים על ${exp.keep}, ומשנים את ${exp.change}.`
  );
}

const GENERATORS = {
  friction: generateFriction,
  circuits: generateCircuits,
  density: generateDensity,
  heat: generateHeat,
  light: generateLight,
  experiments: generateExperiments
};

function chooseFamily(preferred = null) {
  if (preferred) return preferred;
  const families = currentProfile ? currentProfile.families : Object.keys(TRACK.families);
  const weighted = families.flatMap(family => {
    const state = familyState(family);
    const weight = Math.max(1, 6 - state.level) + state.misses;
    return Array(weight).fill(family);
  });
  return pick(weighted);
}

function targetDifficulty(family, similar = false) {
  const state = familyState(family);
  const streakBonus = streak >= 4 ? 2 : streak >= 2 ? 1 : 0;
  const raw = similar ? Math.max(1, state.level - 1) : state.level + streakBonus;
  const profile = currentProfile || LEVEL_PROFILES.standard;
  return Math.max(profile.minDifficulty, Math.min(profile.maxDifficulty, raw));
}

function generateQuestion(preferredFamily = null, similar = false) {
  for (let tries = 0; tries < 40; tries++) {
    const family = chooseFamily(preferredFamily);
    const q = GENERATORS[family](targetDifficulty(family, similar));
    if (!data.solved[q.id] || similar) return q;
  }
  const family = chooseFamily(preferredFamily);
  return GENERATORS[family](targetDifficulty(family, similar));
}

function setScreen(screen) {
  document.getElementById('user-screen').style.display = screen === 'users' ? 'block' : 'none';
  document.getElementById('start-screen').style.display = screen === 'start' ? 'block' : 'none';
  document.getElementById('header').style.display = screen === 'game' ? 'flex' : 'none';
  document.getElementById('progress').style.display = screen === 'game' ? 'block' : 'none';
  document.getElementById('card').style.display = screen === 'game' ? 'block' : 'none';
  document.getElementById('summary').style.display = screen === 'summary' ? 'block' : 'none';
}

function showQuestion() {
  currentQuestion = pending.length ? pending.shift() : generateQuestion();
  const q = currentQuestion;
  document.getElementById('icon').textContent = q.icon;
  document.getElementById('question').textContent = q.question;
  document.getElementById('topic').textContent = `${q.topic} · ${LEVEL_NAMES[q.difficulty - 1]}`;
  document.getElementById('progress').textContent =
    `שאלה ${answered + 1} מתוך ${selectedQuestionCount} · ${TRACK.title}`;
  document.getElementById('score').textContent = score;
  document.getElementById('info-box').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const choices = document.getElementById('choices');
  choices.innerHTML = '';
  shuffle(q.answers).forEach(answer => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'choice';
    btn.textContent = answer;
    btn.addEventListener('click', () => handleAnswer(btn, answer, q));
    choices.appendChild(btn);
  });
}

function handleAnswer(btn, answer, q) {
  const correct = answer === q.correct;
  answered++;
  document.querySelectorAll('.choice').forEach(choice => {
    choice.disabled = true;
    if (choice.textContent === q.correct) choice.classList.add('reveal');
    if (choice !== btn && choice.textContent !== q.correct) choice.classList.add('hidden-after-answer');
  });
  btn.classList.add(correct ? 'correct' : 'wrong');

  const state = familyState(q.family);
  state.total++;
  if (correct) {
    score++;
    streak++;
    state.correct++;
    const stepAt = currentProfile ? currentProfile.levelStepStreak : 3;
    state.level = Math.min(5, state.level + (streak >= stepAt ? 1 : 0));
    data.solved[q.id] = true;
  } else {
    streak = 0;
    state.misses++;
    state.level = Math.max(1, state.level - 1);
    if (answered < selectedQuestionCount) {
      pending.splice(Math.min(1, pending.length), 0, generateQuestion(q.family, true));
      pending.splice(Math.min(2, pending.length), 0, q);
    }
  }
  document.getElementById('score').textContent = score;
  data.history.unshift({ id: q.id, family: q.family, difficulty: q.difficulty, correct, at: Date.now() });
  data.history = data.history.slice(0, 80);
  savePlayerData().catch(console.error);

  document.getElementById('info-box').textContent = q.info;
  document.getElementById('info-box').style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

function showSummary() {
  setScreen('summary');
  const pct = Math.round((score / answered) * 100);
  document.getElementById('final-score').textContent = `${score} / ${answered}`;
  document.getElementById('summary-text').textContent =
    pct === 100 ? 'מעולה! ענית נכון על הכל.' :
    pct >= 70 ? 'יפה מאוד! השאלות הבאות יהיו מורכבות יותר.' :
    pct >= 40 ? 'התחלה טובה. שאלות דומות יחזרו עד שהרעיון יישב טוב.' :
    'כדאי לנסות שוב. המשחק יחזק את הנושאים שבהם היו טעויות.';

  const table = document.getElementById('levels');
  while (table.rows.length > 1) table.deleteRow(1);
  Object.entries(TRACK.families).forEach(([family, meta]) => {
    const state = familyState(family);
    const solvedCount = Object.keys(data.solved).filter(id => id.startsWith(`${family}-`)).length;
    const row = table.insertRow();
    row.innerHTML = `<td>${meta.name}</td><td>${LEVEL_NAMES[state.level - 1]}</td><td>${solvedCount}</td>`;
  });
}

async function showReport(name = player, userData = null) {
  userData = userData || data || await loadPlayerData(name);
  const stats = userStats(userData);
  document.getElementById('report-title').textContent = `ניקוד: ${name}`;
  document.getElementById('report-meta').textContent =
    `${stats.sessions} משחקים · ${stats.solved} שאלות נפתרו · ${stats.correct}/${stats.total} תשובות נכונות`;

  const rows = Object.entries(TRACK.families).map(([family, meta]) => {
    const state = (userData.families || {})[family] || { level: 1, correct: 0, total: 0 };
    const solvedCount = Object.keys(userData.solved || {}).filter(id => id.startsWith(`${family}-`)).length;
    const pct = state.total ? `${Math.round((state.correct / state.total) * 100)}%` : '-';
    return `<tr><td>${meta.name}</td><td>${LEVEL_NAMES[(state.level || 1) - 1]}</td><td>${solvedCount}</td><td>${state.correct || 0}/${state.total || 0}</td><td>${pct}</td></tr>`;
  }).join('');
  document.getElementById('report-content').innerHTML = `
    <table class="report-table">
      <tr><th>נושא</th><th>רמה</th><th>נפתרו</th><th>נכון</th><th>דיוק</th></tr>
      ${rows}
    </table>
  `;
  document.getElementById('report-overlay').classList.add('open');
}

function closeReport() {
  document.getElementById('report-overlay').classList.remove('open');
}

function selectSetupOption(groupId, dataName, value) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.setup-option').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset[dataName] === String(value));
  });
}

function setLevel(level) {
  selectedLevel = LEVEL_PROFILES[level] ? level : 'junior';
  currentProfile = LEVEL_PROFILES[selectedLevel];
  selectSetupOption('level-options', 'level', selectedLevel);
}

function setQuestionCount(count) {
  selectedQuestionCount = Number(count) || 10;
  selectSetupOption('count-options', 'count', selectedQuestionCount);
}

async function startGame() {
  player = document.getElementById('name-input').value.trim() || 'שחקן';
  localStorage.setItem(PLAYER_KEY, player);
  localStorage.setItem(LEVEL_KEY, selectedLevel);
  localStorage.setItem(COUNT_KEY, String(selectedQuestionCount));
  currentProfile = LEVEL_PROFILES[selectedLevel];
  data = await loadPlayerData(player);
  data.sessionCount++;
  await savePlayerData();
  pending = [];
  answered = 0;
  score = 0;
  streak = 0;
  document.getElementById('player-line').textContent =
    `${player} · ${currentProfile.label} · ${selectedQuestionCount} שאלות`;
  setScreen('game');
  showQuestion();
}

function goHome() {
  pending = [];
  answered = 0;
  score = 0;
  streak = 0;
  document.getElementById('score').textContent = '0';
  setScreen('start');
}

document.querySelectorAll('#level-options .setup-option').forEach(btn => {
  btn.addEventListener('click', () => setLevel(btn.dataset.level));
});
document.querySelectorAll('#count-options .setup-option').forEach(btn => {
  btn.addEventListener('click', () => setQuestionCount(btn.dataset.count));
});
document.getElementById('start-btn').addEventListener('click', () => startGame().catch(console.error));
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame().catch(console.error);
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (answered >= selectedQuestionCount) showSummary();
  else showQuestion();
});
document.getElementById('again-btn').addEventListener('click', () => startGame().catch(console.error));
document.getElementById('summary-home-btn').addEventListener('click', goHome);
document.getElementById('summary-scores-btn').addEventListener('click', () => showReport().catch(console.error));
document.getElementById('setup-scores-btn').addEventListener('click', async () => {
  if (!player) return showUsers().catch(console.error);
  data = data || await loadPlayerData(player);
  await showReport();
});
document.getElementById('setup-change-user-btn').addEventListener('click', () => {
  localStorage.removeItem(PLAYER_KEY);
  player = '';
  data = null;
  document.getElementById('name-input').value = '';
  showUsers().catch(console.error);
});
document.getElementById('home-btn').addEventListener('click', goHome);
document.getElementById('scores-btn').addEventListener('click', () => showReport().catch(console.error));
document.getElementById('change-user-btn').addEventListener('click', () => {
  localStorage.removeItem(PLAYER_KEY);
  player = '';
  data = null;
  document.getElementById('name-input').value = '';
  showUsers().catch(console.error);
});
document.getElementById('change-player-btn').addEventListener('click', () => {
  localStorage.removeItem(PLAYER_KEY);
  player = '';
  data = null;
  document.getElementById('name-input').value = '';
  showUsers().catch(console.error);
});
document.getElementById('new-user-btn').addEventListener('click', () => {
  player = '';
  data = null;
  document.getElementById('name-input').value = '';
  setScreen('start');
});
document.getElementById('report-close').addEventListener('click', closeReport);
document.getElementById('report-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('report-overlay')) closeReport();
});

(() => {
  const savedPlayer = localStorage.getItem(PLAYER_KEY);
  setLevel(localStorage.getItem(LEVEL_KEY) || selectedLevel);
  setQuestionCount(localStorage.getItem(COUNT_KEY) || selectedQuestionCount);
  if (savedPlayer) {
    chooseUser(savedPlayer);
  } else {
    showUsers().catch(console.error);
  }
})();
</script>
</body>
</html>
